<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>OWENSONIC • LEGACY THAT OUTLIVES EVERYTHING</title>
 <style>
 body {
 background-color: #000;
 font-family: 'Arial Black', sans-serif;
 color: #fff;
 overflow-x: hidden;
 margin: 0;
 padding: 0;
 }

 .neon-text {
 font-size: 7rem;
 letter-spacing: 15px;
 margin: 0;
 background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 text-shadow: 0 0 40px #00ffff, 0 0 80px #00aaff, 0 0 120px #ff00aa;
 animation: pulse 1.8s infinite alternate;
 text-align: center;
 padding-top: 50px;
 }

 @keyframes pulse {
 0% {
 opacity: 0.9;
 }
 100% {
 opacity: 1;
 transform: scale(1.02);
 }
 }

 .chatbot {
 position: fixed;
 bottom: 0;
 right: 0;
 background-color: rgba(0, 0, 0, 0.8);
 padding: 20px;
 border: 5px solid #00ffff;
 box-shadow: 0 0 50px #00ffff;
 }

 .chatbot input {
 width: 80%;
 height: 40px;
 font-size: 1.6rem;
 padding: 10px;
 border: none;
 border-radius: 10px;
 background-color: #333;
 color: #fff;
 }

 .chatbot button {
 width: 20%;
 height: 40px;
 font-size: 1.6rem;
 padding: 10px;
 border: none;
 border-radius: 10px;
 background-color: #00ffff;
 color: #000;
 cursor: pointer;
 }
 </style>
</head>
<body>
 <header>
 <h1 class="neon-text">OWENSONIC • LEGACY THAT OUTLIVES EVERYTHING</h1>
 </header>
 <div class="chatbot">
 <p>Daisy AI: Hello! Where would you like to go on the site?</p>
 <form>
 <input type="text" id="user-input" placeholder="Type your query...">
 <button type="submit">Send</button>
 </form>
 </div>

 <script>
 // Get elements
 const userInput = document.getElementById('user-input');
 const chatbotForm = document.querySelector('.chatbot form');
 const chatbotOutput = document.querySelector('.chatbot p');

 // Add event listener
 chatbotForm.addEventListener('submit', (e) => {
 e.preventDefault();
 const userQuery = userInput.value.trim();

 // Process user query
 if (userQuery.toLowerCase() === 'hello') {
 chatbotOutput.innerText = 'Daisy AI: Hi there! What can I help you with?';
 } else if (userQuery.toLowerCase() === 'products') {
 chatbotOutput.innerText = 'Daisy AI: Check out our latest products!';
 } else {
 chatbotOutput.innerText = 'Daisy AI: Sorry, I didn\'t understand that. Try again!';
 }

               
 userInput.value = '';
 });
 </script>
</body>
</html>
