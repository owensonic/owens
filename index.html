<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWENSONIC • LEGACY THAT OUTLIVES EVERYTHING</title>
  <style>
    body {
      margin:0; padding:0; background:#000 url('https://picsum.photos/id/1015/1920/1080?grayscale') center/cover fixed;
      background-blend-mode:multiply; color:#fff; font-family:'Arial Black',sans-serif;
      overflow-x:hidden;
    }
    header {
      background:rgba(0,0,0,0.92); padding:50px 20px; text-align:center;
      border-bottom:8px solid #ff0000; box-shadow:0 0 50px #ff0000;
    }
    h1 {
      font-size:7rem; letter-spacing:15px; margin:0;
      background:linear-gradient(90deg,#00ffff,#00ccff,#00ffff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      text-shadow:0 0 40px #00ffff,0 0 80px #00aaff,0 0 120px #ff00aa;
      animation:pulse 1.8s infinite alternate;
    }
    @keyframes pulse {0%{opacity:0.9;}100%{opacity:1;transform:scale(1.02);}}
    .header-icons {display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin:40px 0;}
    .header-icons img {
      width:110px;height:110px;border:5px solid #ff0000;border-radius:15px;
      box-shadow:0 0 35px #00ffff;transition:all .4s;
    }
    .header-icons img:hover {transform:scale(1.25) rotate(12deg);box-shadow:0 0 70px #ff0000;}
    .nav-buttons {display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin:40px 0;}
    .nav-buttons a {
      background:#ff0000;color:#fff;padding:20px 40px;border-radius:60px;
      font-size:1.6rem;font-weight:bold;text-decoration:none;letter-spacing:4px;
      box-shadow:0 0 30px #ff0000,inset 0 0 20px #fff;border:5px solid #00ffff;
      transition:all .3s;
    }
    .nav-buttons a:hover {background:#00ffff;color:#000;transform:scale(1.2);box-shadow:0 0 60px #00ffff;}
    .hero {display:flex;justify-content:space-around;flex-wrap:wrap;padding:70px 5%;gap:50px;background:rgba(0,0,0,0.8);}
    .video-box {width:32%;min-width:340px;text-align:center;}
    iframe {width:100%;height:280px;border:8px solid #ff0000;border-radius:20px;box-shadow:0 0 50px #00ffff;}
    .daisy-circle {
      width:320px;height:320px;margin:50px auto;border-radius:50%;overflow:hidden;
      border:12px solid #00ffff;box-shadow:0 0 80px #00ffff,0 0 140px #ff00aa;
      animation:glow 2.5s infinite alternate;
    }
    @keyframes glow {0%{box-shadow:0 0 80px #00ffff;}100%{box-shadow:0 0 130px #ff00aa;}}
    .
